name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      # Lint backend with the root eslint config (no separate backend config).
      - name: Lint backend
        working-directory: .
        run: npx eslint backend/{routes,repos,middleware,services,db}/**/*.js backend/server.js
      - name: Run tests
        run: npm test
        env:
          DATA_BACKEND: sqlite
          JWT_SECRET: ci-jwt-secret-${{ github.run_id }}-padding-padding-padding
          NODE_ENV: test
